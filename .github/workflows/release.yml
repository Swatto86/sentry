name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: swatinem/rust-cache@v2

      - name: Build installer and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: sentry-ui
          tagName: ${{ github.ref_name }}
          releaseName: Sentry ${{ github.ref_name }}
          releaseBody: |
            ## Sentry ${{ github.ref_name }}

            Autonomous Windows system repair agent. Sentry monitors system health and
            uses AI to diagnose and fix problems automatically — service failures,
            disk pressure, log corruption, driver issues, and more.

            ### Install
            1. Run **`Sentry_${{ github.ref_name }}_x64-setup.exe`** as Administrator.
               The installer registers and starts the `SentrySvc` Windows service and seeds `config.toml` automatically.
            2. Pick your AI provider in the app's **Settings** panel — a free OpenRouter model (no cost), your logged-in Claude CLI session, or an API key.
            3. Launch **Sentry** from the Start Menu — the tray icon appears once the service connects.

            Already running an earlier version? It updates itself automatically.

            ### Uninstall
            Use **Add or Remove Programs** — the uninstaller stops and unregisters the service automatically.
          releaseDraft: false
          prerelease: false
