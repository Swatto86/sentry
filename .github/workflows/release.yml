name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: swatinem/rust-cache@v2

      - name: Build installer and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: sentry-ui
          tagName: ${{ github.ref_name }}
          releaseName: Sentry ${{ github.ref_name }}
          releaseBody: |
            ## Sentry ${{ github.ref_name }}

            Autonomous Windows system repair agent. Sentry monitors system health and
            uses Claude AI to diagnose and fix problems automatically — service
            failures, disk pressure, log corruption, driver issues, and more.

            ### Install
            1. Run **`Sentry_${{ github.ref_name }}_x64-setup.exe`** as Administrator.
               The installer registers and starts the `SentrySvc` Windows service automatically.
            2. Copy `config.toml.example` → `config.toml` in the install directory and fill in your API key.
            3. Launch **Sentry** from the Start Menu — the tray icon appears once the service connects.

            ### Uninstall
            Use **Add or Remove Programs** — the uninstaller stops and unregisters the service automatically.
          releaseDraft: false
          prerelease: false
