[execution]
# Fallback confidence threshold. The LIVE value is set in the app's Settings
# panel (config.toml's monitoring.confidence_threshold) and overrides this at
# startup. Whitelisted, reversible actions auto-execute at or above the threshold;
# below it they are blocked. The catastrophic actions (bcd_edit, driver_disable,
# powershell_diagnostic) are kept off the whitelist on purpose, so they require
# approval regardless of confidence.
confidence_threshold = 0.80
max_retries_per_issue = 3
rate_limit_mins = 30
auto_approve_on_success_rate = 0.95

[whitelist]
actions = [
    "service_restart",
    "service_stop",
    "service_start",
    "log_cleanup",
    "disk_cleanup",
    "task_disable",
    "task_enable",
    "registry_reset",
    "network_diagnostic",
    # Phase 4 — lower-risk actions auto-approved
    "driver_enable",
    "file_delete",
    # Always require approval (disruptive or irreversible — never auto-run):
    # process_kill (can close a foreground app/game), powershell_diagnostic,
    # driver_disable, software_uninstall (also hard-blocked), bcd_edit
]

[blocklist]
# Action types that are never executed — not even with approval.
actions = [
    "software_uninstall",   # one-way door: Eir has no reinstall path, so never remove apps
]

services = [
    "NTDS",
    "KDC",
    "DFSR",
    "NetLogon",
    "Hyper-V",
    "vmms",
    "WdNisDrv",
    "WinDefend",
    "MsMpSvc",
    "WSB",      # Windows Server Backup
    "vss",      # Volume Shadow Copy
]

paths = [
    "C:\\Windows\\System32",
    "C:\\Windows\\SysWOW64",
    "C:\\Windows\\WinSxS",
    "C:\\Windows\\Boot",
    "C:\\Windows\\Fonts",
]
